<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snehal More | Portfolio</title>
  //fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --navy:#0b1f3a;
      --navy-2:#102a4c;
      --charcoal:#1f2937;
      --white:#ffffff;
      --soft:#d7deea;
      --line:rgba(255,255,255,.10);
      --card:rgba(16,42,76,.72);
      --accent1:#7aa9ff;
      --accent2:#a9d2ff;
      --shadow:0 24px 60px rgba(0,0,0,.35);
      --radius:22px;
    }

    *{margin:0;padding:0;box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      font-family:"Poppins",sans-serif;
      color:var(--white);
      background:
        radial-gradient(circle at top left, rgba(122,169,255,.16), transparent 25%),
        radial-gradient(circle at top right, rgba(255,255,255,.08), transparent 20%),
        linear-gradient(180deg, var(--charcoal) 0%, var(--navy) 100%);
      min-height:100vh;
      overflow-x:hidden;
    }

    .container{
      width:min(1200px,92%);
      margin:0 auto;
    }

    .navbar{
      position:sticky;
      top:0;
      z-index:1000;
      backdrop-filter:blur(18px);
      background:rgba(11,31,58,.78);
      border-bottom:1px solid var(--line);
    }

    .nav-inner{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
      padding:16px 0;
      flex-wrap:wrap;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      font-weight:700;
    }

    .brand-mark{
      width:42px;
      height:42px;
      border-radius:14px;
      background:linear-gradient(135deg,var(--accent1),var(--accent2));
      display:grid;
      place-items:center;
      color:#08111d;
      box-shadow:0 0 26px rgba(122,169,255,.35);
    }

    .tabs{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }

    .tablinks{
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.05);
      color:var(--soft);
      padding:10px 15px;
      border-radius:999px;
      cursor:pointer;
      font-weight:500;
      transition:.25s ease;
    }

    .tablinks:hover{
      color:#fff;
      border-color:rgba(255,255,255,.22);
      transform:translateY(-1px);
    }

    .tablinks.active{
      background:linear-gradient(135deg,var(--accent1),var(--accent2));
      color:#06111f;
      border-color:transparent;
      box-shadow:0 12px 28px rgba(122,169,255,.22);
    }

    .hero{
      min-height:calc(100vh - 86px);
      display:grid;
      grid-template-columns:1.05fr .95fr;
      gap:30px;
      align-items:center;
      padding:34px 0 20px;
    }

    .hero-text h1{
      font-size:clamp(2.4rem,5vw,4.8rem);
      line-height:1.03;
      margin-bottom:14px;
    }

    .gradient{
      background:linear-gradient(90deg,var(--accent1),var(--accent2));
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
    }

    .hero-text p{
      color:var(--soft);
      line-height:1.85;
      max-width:650px;
      margin-bottom:26px;
    }

    .hero-meta{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      margin-bottom:26px;
    }

    .meta-chip{
      padding:10px 14px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid var(--line);
      color:#edf3ff;
      font-size:.92rem;
    }

    .hero-actions{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
    }

    .btn{
      padding:12px 20px;
      border-radius:999px;
      border:none;
      cursor:pointer;
      font-weight:600;
      transition:.25s ease;
    }

    .btn-primary{
      background:linear-gradient(135deg,var(--accent1),var(--accent2));
      color:#07111d;
      box-shadow:0 18px 34px rgba(122,169,255,.22);
    }

    .btn-secondary{
      background:transparent;
      color:#fff;
      border:1px solid rgba(255,255,255,.14);
    }

    .btn:hover{
      transform:translateY(-2px);
    }

    .hero-card{
      background:linear-gradient(180deg, rgba(16,42,76,.86), rgba(11,31,58,.96));
      border:1px solid var(--line);
      border-radius:34px;
      padding:24px;
      box-shadow:var(--shadow);
      position:relative;
      overflow:hidden;
    }

    .hero-card::before{
      content:"";
      position:absolute;
      inset:-80px;
      background:
        radial-gradient(circle at top left, rgba(122,169,255,.16), transparent 40%),
        radial-gradient(circle at bottom right, rgba(255,255,255,.08), transparent 35%);
      filter:blur(12px);
      z-index:0;
    }

    .profile{
      position:relative;
      z-index:1;
      text-align:center;
    }

    .profile-img{
      width:100%;
      max-width:320px;
      aspect-ratio:1/1;
      object-fit:cover;
      border-radius:28px;
      border:1px solid rgba(255,255,255,.12);
      box-shadow:0 20px 45px rgba(0,0,0,.28);
      display:block;
      margin:0 auto 18px;
    }

    .profile h2{
      font-size:1.9rem;
      margin-bottom:6px;
    }

    .profile .title{
      color:#dce6f5;
      margin-bottom:10px;
      font-weight:500;
    }

    .profile .small{
      color:var(--soft);
      font-size:.95rem;
      line-height:1.7;
    }

    .tabcontent{
      display:none;
      margin-top:18px;
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:24px;
      box-shadow:var(--shadow);
      animation:fadeUp .45s ease;
    }

    .tabcontent.active{
      display:block;
    }

    .tabcontent h3{
      font-size:1.55rem;
      margin-bottom:12px;
    }

    .tabcontent p,.tabcontent li{
      color:var(--soft);
      line-height:1.8;
    }

    .grid-2{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:18px;
      margin-top:18px;
    }

    .info-card{
      background:rgba(255,255,255,.04);
      border:1px solid var(--line);
      border-radius:18px;
      padding:18px;
    }

    .pill-list{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:14px;
    }

    .pill{
      padding:9px 13px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      color:#f4f7fc;
      font-size:.9rem;
    }

    .timeline{
      border-left:1px solid rgba(255,255,255,.12);
      padding-left:18px;
      margin-top:10px;
    }

    .timeline-item{
      position:relative;
      margin-bottom:18px;
    }

    .timeline-item::before{
      content:"";
      position:absolute;
      left:-25px;
      top:6px;
      width:12px;
      height:12px;
      border-radius:50%;
      background:linear-gradient(135deg,var(--accent1),var(--accent2));
      box-shadow:0 0 18px rgba(122,169,255,.45);
    }

    .timeline-item h4{
      margin-bottom:5px;
      color:#fff;
    }

    .timeline-item .meta{
      font-size:.86rem;
      color:#c7d2e8;
      margin-bottom:6px;
    }

    .contact-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
      margin-top:16px;
    }

    .contact-item{
      background:rgba(255,255,255,.05);
      border:1px solid var(--line);
      border-radius:18px;
      padding:16px;
    }

    .contact-item span{
      display:block;
      color:#fff;
      font-weight:600;
      margin-bottom:6px;
    }

    @keyframes fadeUp{
      from{opacity:0;transform:translateY(14px)}
      to{opacity:1;transform:translateY(0)}
    }

    @media (max-width: 900px){
      .hero{grid-template-columns:1fr;min-height:auto;padding-top:24px}
      .grid-2,.contact-grid{grid-template-columns:1fr}
      .nav-inner{justify-content:center}
      .hero-text{order:2}
      .hero-card{order:1}
    }
  </style>
</head>
<body>

  <header class="navbar">
    <div class="container nav-inner">
      <div class="brand">
