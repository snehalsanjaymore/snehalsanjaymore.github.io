<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snehal More | Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#050814;
      --card:#0d1222;
      --text:#ffffff;
      --muted:#b8c1d9;
      --line:rgba(255,255,255,.10);
      --accent1:#ff7a45;
      --accent2:#ff2e93;
      --shadow:0 20px 60px rgba(0,0,0,.45);
      --radius:22px;
    }

    *{margin:0;padding:0;box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      font-family:"Poppins",sans-serif;
      background:
        radial-gradient(circle at top, rgba(255,122,69,.18), transparent 25%),
        radial-gradient(circle at 80% 20%, rgba(255,46,147,.15), transparent 22%),
        linear-gradient(180deg, #090d1a 0%, #050814 100%);
      color:var(--text);
      min-height:100vh;
    }

    .container{width:min(1200px,92%);margin:0 auto}

    .navbar{
      position:sticky;top:0;z-index:1000;
      backdrop-filter:blur(18px);
      background:rgba(5,8,20,.72);
      border-bottom:1px solid var(--line);
    }

    .nav-inner{
      display:flex;align-items:center;justify-content:space-between;gap:20px;
      padding:18px 0;flex-wrap:wrap;
    }

    .brand{display:flex;align-items:center;gap:12px;font-weight:700}
    .brand-mark{
      width:42px;height:42px;border-radius:14px;
      background:linear-gradient(135deg,var(--accent1),var(--accent2));
      display:grid;place-items:center;
      box-shadow:0 0 25px rgba(255,91,110,.35);
    }

    .tabs{display:flex;flex-wrap:wrap;gap:10px}
    .tablinks{
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.03);
      color:var(--muted);
      padding:10px 16px;
      border-radius:999px;
      cursor:pointer;
      font-weight:500;
      transition:.25s ease;
    }
    .tablinks.active{
      color:#fff;
      background:linear-gradient(135deg,var(--accent1),var(--accent2));
      border-color:transparent;
      box-shadow:0 12px 28px rgba(255,80,110,.28);
    }

    .hero{
      padding:44px 0 22px;
      display:grid;
      grid-template-columns:1.1fr .9fr;
      gap:28px;
      align-items:center;
      min-height:calc(100vh - 90px);
    }

    .hero-text h1{
      font-size:clamp(2.4rem,5vw,4.8rem);
      line-height:1.02;
      margin-bottom:14px;
    }

    .gradient{
      background:linear-gradient(90deg,var(--accent1),var(--accent2));
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
    }

    .hero-text p{
      color:var(--muted);
      max-width:650px;
      line-height:1.8;
      margin-bottom:26px;
    }

    .hero-meta{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:28px}
    .meta-chip{
      padding:10px 14px;border-radius:999px;
      background:rgba(255,255,255,.04);
      border:1px solid var(--line);
      color:#dfe5f8;font-size:.92rem;
    }

    .hero-actions{display:flex;flex-wrap:wrap;gap:12px}
    .btn{
      padding:12px 20px;border-radius:999px;border:none;cursor:pointer;
      font-weight:600;transition:.25s ease;
    }
    .btn-primary{
      background:linear-gradient(135deg,var(--accent1),var(--accent2));
      color:white;
      box-shadow:0 18px 34px rgba(255,80,110,.25);
    }
    .btn-secondary{
      background:transparent;color:#fff;border:1px solid rgba(255,255,255,.14);
    }

    .hero-card{
      background:linear-gradient(180deg, rgba(18,25,45,.92), rgba(13,18,34,.92));
      border:1px solid var(--line);
      border-radius:34px;
      padding:22px;
      box-shadow:var(--shadow);
      position:relative;
      overflow:hidden;
    }

    .hero-card::before{
      content:"";
      position:absolute;inset:-80px;
      background:
        radial-gradient(circle at top left, rgba(255,122,69,.18), transparent 40%),
        radial-gradient(circle at bottom right, rgba(255,46,147,.16), transparent 38%);
      filter:blur(10px);
      z-index:0;
    }

    .profile{position:relative;z-index:1;text-align:center}
    .profile-img{
      width:100%;
      max-width:320px;
      aspect-ratio:1/1;
      object-fit:cover;
      border-radius:28px;
      border:1px solid rgba(255,255,255,.12);
      box-shadow:0 20px 45px rgba(0,0,0,.35);
      margin:0 auto 18px;
      display:block;
    }

    .profile h2{font-size:1.9rem;margin-bottom:6px}
    .profile .title{color:#d6def3;margin-bottom:10px;font-weight:500}
    .profile .small{color:var(--muted);font-size:.95rem;line-height:1.7}

    .section-box{
      margin-top:18px;
      background:rgba(255,255,255,.03);
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:24px;
      box-shadow:var(--shadow);
      animation:fadeUp .45s ease;
    }

    .tabcontent{display:none}
    .tabcontent.active{display:block}

    .section-box h3{font-size:1.6rem;margin-bottom:12px}
    .section-box p,.section
