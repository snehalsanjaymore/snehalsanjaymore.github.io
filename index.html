<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snehal More | Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --navy:#002F6C;
      --charcoal:#36454F;
      --white:#FFFFFF;
      --muted:#D3DBE6;
      --line:rgba(255,255,255,.08);
      --shadow:0 10px 30px rgba(0,0,0,.28);
      --radius:16px;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      font-family:"Poppins",sans-serif;
      background:linear-gradient(135deg, #002F6C 0%, #121820 55%, #36454F 100%);
      color:var(--white);
      min-height:100vh;
    }

    .layout{
      display:flex;
      min-height:100vh;
    }

    .left-panel{
      width:300px;
      background:rgba(0,47,108,.92);
      padding:24px 18px;
      border-right:1px solid rgba(255,255,255,.10);
      box-shadow:var(--shadow);
      position:sticky;
      top:0;
      align-self:flex-start;
    }

    .profile-wrapper{
      text-align:center;
    }

    .profile-img{
      width:100%;
      max-width:200px;
      aspect-ratio:1/1;
      object-fit:cover;
      border-radius:20px;
      border:2px solid rgba(255,255,255,.7);
      box-shadow:0 10px 24px rgba(0,0,0,.35);
      margin:0 auto 16px;
      display:block;
    }

    .name{
      font-size:1.5rem;
      font-weight:700;
      margin-bottom:5px;
    }

    .role{
      font-size:.92rem;
      color:var(--muted);
      margin-bottom:10px;
      line-height:1.5;
    }

    .location{
      font-size:.86rem;
      color:var(--muted);
      margin-bottom:16px;
    }

    .side-section-title{
      font-size:.78rem;
      text-transform:uppercase;
      letter-spacing:.14em;
      color:var(--muted);
      margin:16px 0 8px;
      text-align:left;
    }

    .side-list{
      list-style:none;
      font-size:.86rem;
      color:var(--white);
      text-align:left;
      line-height:1.7;
    }

    .side-list li{
      margin-bottom:5px;
    }

    .side-list small{
      color:var(--muted);
      font-size:.8rem;
      word-break:break-word;
    }

    .right-panel{
      flex:1;
      padding:24px;
    }

    .top-bar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:14px;
      flex-wrap:wrap;
      margin-bottom:16px;
    }

    .headline{
      font-size:1.05rem;
      color:var(--muted);
    }

    .tabs{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }

    .tablinks{
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.03);
      color:var(--muted);
      padding:8px 14px;
      font-size:.85rem;
      cursor:pointer;
      transition:.22s ease;
    }

    .tablinks:hover{
      color:var(--white);
      background:rgba(255,255,255,.08);
    }

    .tablinks.active{
      background:var(--white);
      color:var(--navy);
      border-color:transparent;
    }

    .tabcontent{
      display:none;
      margin-top:10px;
    }

    .tabcontent.active{
      display:block;
      animation:fadeUp .35s ease;
    }

    .section-box{
      background:rgba(8,14,24,.82);
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:18px 20px;
      box-shadow:var(--shadow);
    }

    .section-box h2{
      font-size:1.25rem;
      margin-bottom:8px;
    }

    .section-box p,
    .section-box li{
      color:var(--muted);
      line-height:1.75;
      font-size:.93rem;
    }

    .grid-2{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:14px;
      margin-top:14px;
    }

    .info-card{
      background:rgba(255,255,255,.015);
      border-radius:12px;
      border:1px solid rgba(255,255,255,.08);
      padding:14px;
    }

    .info-card h3{
      font-size:1rem;
      margin-bottom:5px;
      color:var(--white);
    }

    .pill-list{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:10px;
    }

    .pill{
      padding:7px 11px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.03);
      font-size:.84rem;
      color:var(--white);
    }

    .timeline{
      border-left:1px solid rgba(255,255,255,.18);
      padding-left:16px;
      margin-top:8px;
    }

    .timeline-item{
      position:relative;
      margin-bottom:16px;
    }

    .timeline-item::before{
      content:"";
      position:absolute;
      left:-22px;
      top:6px;
      width:10px;
      height:10px;
      border-radius:50%;
      background:var(--white);
      box-shadow:0 0 10px rgba(255,255,255,.6);
    }

    .timeline-item h3{
      font-size:.98rem;
      margin-bottom:4px;
      color:var(--white);
    }

    .timeline-item .meta{
      font-size:.82rem;
      color:var(--muted);
      margin-bottom:4px;
    }

      display:grid;
