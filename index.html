<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snehal More | Portfolio</title>
  <style>
    :root{
      --bg:#0b1320;
      --panel:#121c2c;
      --panel-2:#0f1826;
      --border:rgba(255,255,255,0.08);
      --text:#f3f6fb;
      --muted:#9aa8bb;
      --accent:#5fa8ff;
      --accent-2:#8ec5ff;
      --chip:#1a2537;
      --shadow:0 20px 60px rgba(0,0,0,0.35);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height:1.65;
      overflow-x:hidden;
    }
    a{color:inherit;text-decoration:none}
    .page{
      min-height:100vh;
      display:grid;
      grid-template-columns: 330px 1fr;
    }
    .sidebar{
      position:sticky;
      top:0;
      height:100vh;
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      border-right:1px solid var(--border);
      padding:28px 24px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      gap:18px;
    }
    .avatar-wrap{
      width:150px;
      height:150px;
      border-radius:50%;
      padding:4px;
      background: linear-gradient(135deg, rgba(95,168,255,.65), rgba(142,197,255,.15));
      box-shadow: var(--shadow);
      margin-top:6px;
      flex-shrink:0;
    }
    .avatar{
      width:100%;
      height:100%;
      border-radius:50%;
      object-fit:cover;
      object-position:center top;
      display:block;
      border:3px solid rgba(255,255,255,0.08);
      background:#243044;
    }
    .name{
      font-size:2rem;
      font-weight:800;
      line-height:1.1;
      text-align:center;
      letter-spacing:-0.02em;
    }
    .role{
      color:var(--muted);
      text-align:center;
      font-size:1rem;
      max-width:240px;
    }
    .role span{color:var(--text)}
    .sidebar-card{
      width:100%;
      background:rgba(255,255,255,0.03);
      border:1px solid var(--border);
      border-radius:18px;
      padding:16px;
    }
    .sidebar-title{
      font-size:.78rem;
      text-transform:uppercase;
      letter-spacing:.16em;
      color:var(--muted);
      margin-bottom:12px;
    }
    .nav{
      width:100%;
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .nav a{
      padding:10px 12px;
      border-radius:10px;
      color:#d9e2ef;
      border:1px solid transparent;
      transition:.2s ease;
      font-size:.98rem;
    }
    .nav a:hover{
      background:rgba(95,168,255,0.08);
      border-color:rgba(95,168,255,0.18);
      color:var(--accent-2);
    }
    .sidebar-footer{
      width:100%;
      margin-top:auto;
      color:var(--muted);
      font-size:.9rem;
      text-align:center;
      padding-top:10px;
    }
    .content{
      padding:34px 34px 40px;
    }
    .hero{
      display:grid;
      grid-template-columns: 1.3fr .9fr;
      gap:28px;
      align-items:start;
      margin-bottom:34px;
    }
    .hero-main, .hero-side, .section-card, .contact-card{
      background:rgba(255,255,255,0.03);
      border:1px solid var(--border);
      border-radius:22px;
      box-shadow: var(--shadow);
    }
    .hero-main{
      padding:28px;
      min-height:260px;
    }
    .eyebrow{
      display:inline-block;
      font-size:.76rem;
      text-transform:uppercase;
      letter-spacing:.16em;
      color:var(--accent-2);
      margin-bottom:16px;
    }
    h1{
      font-size:clamp(2rem, 3.7vw, 3.6rem);
      line-height:1.06;
      letter-spacing:-0.03em;
      margin-bottom:18px;
    }
    .lead{
      color:#d8e1ec;
      font-size:1.03rem;
      max-width:760px;
    }
    .hero-side{
      padding:24px;
      display:flex;
      flex-direction:column;
      gap:18px;
    }
    .snapshot-title{
      font-size:1.15rem;
      font-weight:800;
      margin-bottom:10px;
    }
    ul.clean{
      list-style:none;
      display:flex;
      flex-direction:column;
      gap:10px;
    }
