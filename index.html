<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snehal More | Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --navy:#002F6C;      /* Navy blue */      /* [web:75] */
      --charcoal:#36454F;  /* Charcoal */       /* [web:78] */
      --white:#FFFFFF;     /* Crisp white */    /* [web:75] */
      --muted:#C0CAD8;
      --line:rgba(255,255,255,.12);
      --shadow:0 18px 50px rgba(0,0,0,.55);
      --radius:18px;
    }

    *{margin:0;padding:0;box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      font-family:"Poppins",sans-serif;
      background:
        radial-gradient(circle at top, rgba(0,47,108,.55), transparent 55%),
        radial-gradient(circle at bottom right, rgba(54,69,79,.65), #020712);
      color:var(--white);
      min-height:100vh;
    }

    .layout{
      display:flex;
      min-height:100vh;
    }

    /* LEFT PANEL: photo + name */
    .left-panel{
      width:310px;
      background:linear-gradient(180deg, var(--navy), #020712);
      padding:28px 22px;
      border-right:1px solid rgba(255,255,255,.12);
      box-shadow:var(--shadow);
      position:sticky;
      top:0;
      align-self:flex-start;
    }

    .profile-wrapper{
      text-align:center;
    }

    .profile-img{
      width:100%;
      max-width:220px;
      aspect-ratio:1/1;
      object-fit:cover;
      border-radius:24px;
      border:2px solid rgba(255,255,255,.75);
      box-shadow:0 14px 36px rgba(0,0,0,.55);
      margin:0 auto 18px;
      display:block;
    }

    .name{
      font-size:1.7rem;
      font-weight:700;
      margin-bottom:4px;
    }

    .role{
      font-size:.95rem;
      color:var(--muted);
      margin-bottom:14px;
    }

    .location{
      font-size:.88rem;
      color:var(--muted);
      margin-bottom:14px;
    }

    .side-section-title{
      font-size:.8rem;
      text-transform:uppercase;
      letter-spacing:.15em;
      color:var(--muted);
      margin:18px 0 8px;
      text-align:left;
    }

    .side-list{
      list-style:none;
      font-size:.86rem;
      color:var(--white);
      text-align:left;
    }

    .side-list li{
      margin-bottom:6px;
    }

    .side-list small{
      color:var(--muted);
      font-size:.8rem;
    }

    /* RIGHT PANEL: tabs + content */
    .right-panel{
      flex:1;
      padding:28px 32px;
    }

    .top-bar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:18px;
      flex-wrap:wrap;
      gap:14px;
    }

    .tabs{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }

    .tablinks{
      border-radius:999px;
      border:1px solid rgba(255,255,255,.18);
      background:rgba(1,10,20,.55);
      color:var(--muted);
      padding:8px 16px;
      font-size:.88rem;
      cursor:pointer;
      transition:.25s ease;
    }

    .tablinks:hover{
      background:rgba(255,255,255,.08);
      color:var(--white);
    }

    .tablinks.active{
      background:var(--white);
      color:var(--navy);
      border-color:transparent;
      box-shadow:0 10px 26px rgba(0,0,0,.45);
    }

    .headline{
      font-size:1.1rem;
      font-weight:500;
      color:var(--muted);
    }

    .tabcontent{
      display:none;
      margin-top:12px;
    }

    .tabcontent.active{
      display:block;
      animation:fadeUp .35s ease;
    }

    .section-box{
      background:rgba(6,12,22,.9);
      border-radius:var(--radius);
      border:1px solid var(--line);
      padding:20px 22px;
      box-shadow:var(--shadow);
    }

    .section-box h2{
      font-size:1.4rem;
      margin-bottom:8px;
    }

    .section-box p,
    .section-box li{
      color:var(--muted);
      line-height:1.7;
      font-size:.93rem;
    }

    .grid-2{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:16px;
      margin-top:14px;
    }

    .info-card{
      background:rgba(255,255,255,.02);
      border-radius:14px;
      border:1px solid rgba(255,255,255,.12);
      padding:14px 15px;
    }

    .info-card h3{
      font-size:1rem;
      margin-bottom:6px;
    }

    .pill-list{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:10px;
    }

    .pill{
      padding:7px 11px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.18);
      background:rgba(255,255,255,.03);
      font-size:.84rem;
      color:var(--white);
    }

    .timeline{
      border-left:1px solid rgba(255,255,255,.25);
      padding-left:16px;
      margin-top:8px;
    }

    .timeline-item{
      position:relative;
      margin-bottom:16px;
    }

    .timeline-item::before{
      content:"";
      position:absolute;
      left:-22px;
      top:6px;
      width:10px;
      height:10px;
      border-radius:50%;
      background:var(--white);
      box-shadow:0 0 12px rgba(255,255,255,.8);
    }

    .timeline-item h3{
      font-size:.98rem;
      margin-bottom:4px;
    }

    .timeline-item .meta{
      font-size:.82rem;
      color:var(--muted);
      margin-bottom:4px;
    }

    .contact-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:14px;
      margin-top:12px;
    }

    .contact-item{
      background:rgba(255,255,255,.02);
      border-radius:14px;
      border:1px solid rgba(255,255,255,.16);
      padding:12px 13px;
      font-size:.9rem;
